<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Server Log</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: #fff;
  padding: 20px;
}

h1 {
  color: #00ff00;
}

button {
  padding: 10px 20px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #00ff00;
  color: #000;
  cursor: pointer;
}

.group {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
}

.req { background: #001f2f; }
.ok  { background: #002f00; }
.err { background: #2f0000; }

.group h3 {
  margin-bottom: 10px;
}

.log {
  font-family: monospace;
  margin: 5px 0;
}
</style>

</head>

<body>

<h1>🖥 Server Log (Server hiện tại)</h1>

<button onclick="loadLog()">Xem log</button>

<div class="group req">
  <h3>📥 Nhận request</h3>
  <div id="request"></div>
</div>

<div class="group ok">
  <h3>✅ Thành công</h3>
  <div id="success"></div>
</div>

<div class="group err">
  <h3>❌ Lỗi</h3>
  <div id="error"></div>
</div>

<script>
function loadLog() {
  fetch("http://localhost:8080/api/log")
    .then(res => res.json())
    .then(data => {

      let requestLogs = "";
      let successLogs = "";
      let errorLogs = "";

      data.forEach(log => {

        if (log.includes("nhận request")) {
          requestLogs += `<div class="log" style="color:#00bfff">${log}</div>`;
        }
        else if (log.includes("thành công")) {
          successLogs += `<div class="log" style="color:#00ff00">${log}</div>`;
        }
        else {
          errorLogs += `<div class="log" style="color:#ff4d4d">${log}</div>`;
        }

      });

      document.getElementById("request").innerHTML = requestLogs;
      document.getElementById("success").innerHTML = successLogs;
      document.getElementById("error").innerHTML = errorLogs;

    })
    .catch(err => {
      alert("Không load được log!");
      console.error(err);
    });
}
</script>

</body>
</html>
